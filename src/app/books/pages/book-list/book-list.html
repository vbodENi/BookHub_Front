  <div class="uk-section uk-section-small">                                                                                                                                                                                
    <div class="uk-container">                                                                                                                                                                                             
      <h1 class="uk-heading-small uk-margin-medium-bottom">Catalogue</h1>                                                                                                                                                  
                                                                                                                                                                                                                           
      <div class="uk-child-width-1-2 uk-child-width-1-3@m uk-child-width-1-4@l uk-grid-match uk-grid-small" uk-grid>                                                                                                       
        @for (book of books(); track book.id) {
          <div>
            <div class="uk-card uk-card-default uk-card-hover">
              <div class="uk-cover-container uk-height-small">
                <img [src]="book.coverUrl" [alt]="book.title" uk-cover />
              </div>
              <div class="uk-card-body uk-padding-small">
                <p class="uk-text-bold uk-text-small uk-margin-remove">{{ book.title }}</p>
                <p class="uk-text-muted uk-text-small uk-margin-small-top uk-margin-remove-bottom">{{ book.author }}</p>
                <div class="uk-margin-small-top">
                  @if (book.availableCopies > 0) {
                    <span class="uk-label uk-label-success">Dispo</span>
                  } @else {
                    <span class="uk-label uk-label-danger">Emprunté</span>
                  }
                </div>
              </div>
            </div>
          </div>
        }
      </div>

    </div>
  </div>
